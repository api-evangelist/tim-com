apis:
  - aid: tim-com:tim-sim-swap
    name: TIM SIM Swap
    description: >-
      CAMARA-aligned API that returns the timestamp of the last SIM swap
      (or whether a swap occurred within a caller-supplied window) for a
      given TIM mobile number. Used by banks and fintechs as a signal
      against account-takeover and SIM-swap fraud before authorizing
      sensitive transactions.
    humanURL: https://developer.tim.it/security/TIM%20SIM%20Swap/dev
    tags:
      - Security
      - SIM Swap
      - Anti-Fraud
      - CAMARA
      - GSMA
    properties:
      - type: Documentation
        url: https://developer.tim.it/security/TIM%20SIM%20Swap/dev
      - type: Documentation
        url: https://www.tim.com.br/open-gateway/sim-swap
        name: TIM Brasil SIM Swap
      - type: Standards
        url: https://github.com/camaraproject/SimSwap
        name: CAMARA SimSwap reference
  - aid: tim-com:tim-number-verification
    name: TIM Number Verification
    description: >-
      CAMARA Number Verification API that authenticates a mobile device
      by silently confirming the MSISDN bound to the active mobile data
      session against the number asserted by the application. Eliminates
      the need for SMS-OTP and replaces it with passive carrier-grade
      verification.
    humanURL: https://developer.tim.it/security/TIM%20Number%20Verification/dev
    tags:
      - Security
      - Number Verification
      - Passwordless
      - CAMARA
      - GSMA
    properties:
      - type: Documentation
        url: https://developer.tim.it/security/TIM%20Number%20Verification/dev
      - type: Documentation
        url: https://www.tim.com.br/open-gateway/number-verify
        name: TIM Brasil Number Verify
      - type: Standards
        url: https://github.com/camaraproject/NumberVerification
        name: CAMARA NumberVerification reference
  - aid: tim-com:tim-know-your-customer-match
    name: TIM Know Your Customer - Match
    description: >-
      KYC Match API that compares customer-supplied attributes (name, tax
      ID, date of birth, address) against TIM's subscriber records and
      returns per-attribute match scores. Used during onboarding to
      validate identity claims, populate registration forms, and reduce
      manual KYC review.
    humanURL: https://developer.tim.it/security/TIM%20Know%20Your%20Customer%20-%20Match/dev
    tags:
      - Security
      - KYC
      - Identity Verification
      - CAMARA
      - GSMA
    properties:
      - type: Documentation
        url: https://developer.tim.it/security/TIM%20Know%20Your%20Customer%20-%20Match/dev
      - type: Documentation
        url: https://www.tim.com.br/open-gateway/know-your-customer
        name: TIM Brasil KYC
      - type: Standards
        url: https://github.com/camaraproject/KnowYourCustomer
        name: CAMARA KnowYourCustomer reference
  - aid: tim-com:tim-ip-to-msisdn
    name: TIM IP to MSISDN
    description: >-
      Given an IP address observed by a relying party, returns the TIM
      mobile number (MSISDN) currently associated with that radio session.
      Intended for banking and payment apps that need to bind an in-app
      action to a known mobile number without an OTP round-trip.
    humanURL: https://developer.tim.it/security/TIM%20IP%20to%20MSISDN/dev
    tags:
      - Security
      - IP Lookup
      - MSISDN
      - Anti-Fraud
    properties:
      - type: Documentation
        url: https://developer.tim.it/security/TIM%20IP%20to%20MSISDN/dev
  - aid: tim-com:tim-ip-to-number
    name: TIM IP to Number
    description: >-
      Given an IP address, returns the TIM fixed-line or mobile number
      associated with the session. Extends IP-to-MSISDN to cover both
      mobile and broadband subscribers for fraud and access-control use
      cases.
    humanURL: https://developer.tim.it/security/TIM%20IP%20to%20Number/dev
    tags:
      - Security
      - IP Lookup
      - Fixed Line
      - Anti-Fraud
    properties:
      - type: Documentation
        url: https://developer.tim.it/security/TIM%20IP%20to%20Number/dev
  - aid: tim-com:tim-device-location
    name: TIM Device Location
    description: >-
      CAMARA Device Location verification API offered by TIM Brasil Open
      Gateway. Confirms whether a mobile device is physically within a
      supplied geographic area at request time, supporting geofenced
      authentication, claims validation, and fraud checks.
    humanURL: https://www.tim.com.br/open-gateway/device-location
    tags:
      - Location
      - Device Location
      - Anti-Fraud
      - CAMARA
      - GSMA
    properties:
      - type: Documentation
        url: https://www.tim.com.br/open-gateway/device-location
      - type: Standards
        url: https://github.com/camaraproject/DeviceLocation
        name: CAMARA DeviceLocation reference
