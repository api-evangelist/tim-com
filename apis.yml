aid: tim-com
name: TIM
description: >-
  TIM S.p.A. (formerly Telecom Italia) is the incumbent Italian
  telecommunications operator headquartered in Rome and one of the largest
  telcos in Europe. The group operates fixed and mobile networks across Italy
  under the TIM Consumer and TIM Enterprise brands, runs TIM Brasil (the
  second-largest mobile operator in Brazil), and owns a portfolio of
  technology subsidiaries including Sparkle (international connectivity and
  quantum-safe infrastructure), Noovle (cloud), Telsy (cybersecurity), and
  Olivetti (IT services). TIM exposes its mobile network as a programmable
  platform through the developer.tim.it portal in Italy and through
  TIM Open Gateway in Brazil, both implementing CAMARA-standard network APIs
  (SIM Swap, Number Verification, Know Your Customer, IP-to-MSISDN, IP-to-
  Number, Device Location) jointly defined by the Linux Foundation, TM Forum,
  and GSMA. These APIs let banks, fintechs, insurers, retailers, and online
  services authenticate users, detect SIM-swap fraud, verify customer
  identity, and locate devices using TIM's mobile network as the trust anchor.
  As of late 2025 TIM Brasil reported 50 million Open Gateway API queries
  across its catalog.
